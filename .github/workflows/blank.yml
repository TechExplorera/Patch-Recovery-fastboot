# .github/workflows/twrpdtgen.yml
name: Generate TWRP Device Tree

on:
  workflow_dispatch:
    inputs:
      recovery_url:
        description: 'URL directa al recovery.img / boot.img (dejar vacío si lo subes al repo)'
        required: false
        default: ''
      recovery_path:
        description: 'Ruta al recovery.img dentro del repo (si no usas URL)'
        required: false
        default: 'recovery.img'
      output_dir:
        description: 'Carpeta destino dentro del repo para el tree generado'
        required: false
        default: 'device_tree'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar dependencias
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip cpio git

      - name: Instalar twrpdtgen
        run: |
          pip3 install --upgrade pip
          pip3 install twrpdtgen

      - name: Descargar recovery.img (si se dio URL)
        if: ${{ inputs.recovery_url != '' }}
        run: |
          curl -L -o recovery.img "${{ inputs.recovery_url }}"

      - name: Verificar imagen presente
        run: |
          IMG="${{ inputs.recovery_url != '' && 'recovery.img' || inputs.recovery_path }}"
          if [ ! -f "$IMG" ]; then
            echo "No se encontró la imagen en $IMG"
            exit 1
          fi
          echo "IMG_PATH=$IMG" >> $GITHUB_ENV

      - name: Ejecutar twrpdtgen
        run: |
          python3 -m twrpdtgen "$IMG_PATH" -o "${{ inputs.output_dir }}"

      - name: Mostrar estructura generada
        run: |
          find "${{ inputs.output_dir }}" -maxdepth 4

      - name: Commit y push directo al repo
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add "${{ inputs.output_dir }}"
          git diff --cached --quiet && echo "Nada que commitear" && exit 0
          git commit -m "Auto-generated TWRP device tree (run #${{ github.run_number }})"
          git push origin HEAD:${{ github.ref_name }}

      - name: Subir también como artifact (respaldo)
        uses: actions/upload-artifact@v4
        with:
          name: twrp-device-tree-${{ github.run_number }}
          path: ${{ inputs.output_dir }}/
          retention-days: 14
